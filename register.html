<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Platuto - Register</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <style>
        .hover-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            transition: transform 0.2s ease-in-out;
        }

        .hover-card:hover {
            transform: scale(1.02);
        }

        .hover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(24, 106, 122, 0.85);
            /* #186a7a matching the primary theme */
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            border-radius: 15px;
            z-index: 10;
        }

        .hover-card:hover .hover-overlay {
            opacity: 1;
        }

        .hover-overlay i {
            color: white;
            font-size: 5rem;
        }

        /* Ensures the card body stays behind the overlay */
        .card-body {
            position: relative;
            z-index: 1;
        }
    </style>

</head>

<body style="background-color: #008B8B;">

    <div class="container">

        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

            <div class="col-12 text-center mb-5">
                <h1 class="text-white" style="font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.2);">¿Qué tipo de
                    cuenta deseas crear?</h1>
            </div>

            <!-- Asesorado Card -->
            <div class="col-md-6 col-lg-5 mb-4">
                <div class="card border-0 shadow-lg h-100 py-4 hover-card" data-toggle="modal"
                    data-target="#modalAsesorado">
                    <div class="hover-overlay">
                        <i class="fas fa-plus"></i>
                    </div>
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <div class="mb-4 mx-auto"
                            style="width: 200px; height: 200px; border: 2px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; background-color: #f8f9fc;">
                            <img src="img/asesorado.avif" alt="Logo" style="max-width: 100%; height: auto;">
                        </div>
                        <h2 class="h3 text-gray-800 font-weight-bold mb-0">Asesorado</h2>
                    </div>
                </div>
            </div>

            <!-- Tutor Card -->
            <div class="col-md-6 col-lg-5 mb-4">
                <div class="card border-0 shadow-lg h-100 py-4 hover-card" data-toggle="modal"
                    data-target="#modalTutor">
                    <div class="hover-overlay">
                        <i class="fas fa-plus"></i>
                    </div>
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <div class="mb-4 mx-auto"
                            style="width: 200px; height: 200px; border: 2px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; background-color: #f8f9fc;">
                            <img src="img/tutor.jpg" alt="Logo" style="max-width: 100%; height: auto;">
                        </div>
                        <h2 class="h3 text-gray-800 font-weight-bold mb-0">Tutor</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 text-center mt-4">
                <a class="text-white" href="login.html" style="font-size: 1.1rem; text-decoration: underline;">¿Ya
                    tienes una cuenta? Inicia sesión!</a>
            </div>

        </div>

    </div>

    <!-- Modal Asesorado -->
    <div class="modal fade" id="modalAsesorado" tabindex="-1" role="dialog" aria-labelledby="modalAsesoradoLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <form id="formRegistroAsesorado" novalidate>
                    <div class="modal-header bg-primary text-white"
                        style="background-color: #008B8B !important; border-bottom: none;">
                        <h5 class="modal-title font-weight-bold" id="modalAsesoradoLabel">Registro de Asesorado</h5>
                        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body p-4">
                        <p class="mb-3 text-center">Por favor ingresa tu número de control para continuar:</p>

                        <!-- Alerta inline -->
                        <div id="alertaAsesorado" class="alert alert-danger d-none align-items-center mb-3" role="alert">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span id="alertaAsesoradoMsg"></span>
                        </div>

                        <div class="form-group mb-0">
                            <label for="numeroControlAsesorado" class="font-weight-bold text-gray-800">Número de Control</label>
                            <input type="text" class="form-control form-control-user" id="numeroControlAsesorado"
                                placeholder="Ej. 12345678" inputmode="numeric" maxlength="8"
                                oninput="this.value = this.value.replace(/[^0-9]/g, ''); document.getElementById('alertaAsesorado').classList.add('d-none');"
                                required>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 justify-content-center">
                        <button type="button" class="btn btn-secondary px-4" data-dismiss="modal">Cerrar</button>
                        <button type="submit" id="btnSubmitAsesorado" class="btn btn-primary px-4"
                            style="background-color: #008B8B; border-color: #008B8B; min-width: 110px;">
                            <span id="btnAsesoradoTexto">Continuar</span>
                            <span id="btnAsesoradoSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Tutor -->
    <div class="modal fade" id="modalTutor" tabindex="-1" role="dialog" aria-labelledby="modalTutorLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <form id="formRegistroTutor" novalidate>
                    <div class="modal-header bg-primary text-white"
                        style="background-color: #008B8B !important; border-bottom: none;">
                        <h5 class="modal-title font-weight-bold" id="modalTutorLabel">Registro de Tutor</h5>
                        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body p-4">
                        <p class="mb-3 text-center">Selecciona tu rol e ingresa tu número de control:</p>

                        <!-- Alerta inline -->
                        <div id="alertaTutor" class="alert alert-danger d-none align-items-center mb-3" role="alert">
                            <i class="fas fa-exclamation-circle mr-2"></i>
                            <span id="alertaTutorMsg"></span>
                        </div>

                        <div class="form-group">
                            <label for="tipoTutor" class="font-weight-bold text-gray-800">Tipo de Tutor</label>
                            <select class="form-control" id="tipoTutor" required
                                oninput="document.getElementById('alertaTutor').classList.add('d-none');">
                                <option value="" disabled selected>Selecciona una opción...</option>
                                <option value="alumno">Alumno</option>
                                <option value="maestro">Maestro</option>
                            </select>
                        </div>
                        <div class="form-group mt-3 mb-0">
                            <label for="numeroControlTutor" class="font-weight-bold text-gray-800">Número de Control</label>
                            <input type="text" class="form-control form-control-user" id="numeroControlTutor"
                                placeholder="Ej. 12345678" inputmode="numeric" maxlength="8"
                                oninput="this.value = this.value.replace(/[^0-9]/g, ''); document.getElementById('alertaTutor').classList.add('d-none');"
                                required>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 justify-content-center">
                        <button type="button" class="btn btn-secondary px-4" data-dismiss="modal">Cerrar</button>
                        <button type="submit" id="btnSubmitTutor" class="btn btn-primary px-4"
                            style="background-color: #008B8B; border-color: #008B8B; min-width: 110px;">
                            <span id="btnTutorTexto">Continuar</span>
                            <span id="btnTutorSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <script>
        // ── Helper: mostrar alerta inline ────────────────────────────────────
        function mostrarAlerta(idAlerta, idMensaje, mensaje) {
            const alerta = document.getElementById(idAlerta);
            document.getElementById(idMensaje).textContent = mensaje;
            alerta.classList.remove('d-none');
            alerta.classList.add('d-flex');
        }

        // ── Helper: toggle botón de carga ─────────────────────────────────────
        function setLoading(idBtn, idTexto, idSpinner, loading) {
            document.getElementById(idBtn).disabled = loading;
            document.getElementById(idTexto).classList.toggle('d-none', loading);
            document.getElementById(idSpinner).classList.toggle('d-none', !loading);
        }

        // ── Helper: verificar nocontrol en la BD ──────────────────────────────
        async function verificarNocontrol(nocontrol) {
            const res = await fetch('/api/alumnos/' + encodeURIComponent(nocontrol));
            return await res.json(); // { success, data, message }
        }

        // ── Limpiar alertas al cerrar modales ─────────────────────────────────
        $('#modalAsesorado').on('hidden.bs.modal', function () {
            document.getElementById('alertaAsesorado').classList.add('d-none');
            document.getElementById('alertaAsesorado').classList.remove('d-flex');
            document.getElementById('formRegistroAsesorado').reset();
        });
        $('#modalTutor').on('hidden.bs.modal', function () {
            document.getElementById('alertaTutor').classList.add('d-none');
            document.getElementById('alertaTutor').classList.remove('d-flex');
            document.getElementById('formRegistroTutor').reset();
        });

        // ── Formulario Asesorado ──────────────────────────────────────────────
        document.getElementById('formRegistroAsesorado').addEventListener('submit', async function (e) {
            e.preventDefault();
            const nocontrol = document.getElementById('numeroControlAsesorado').value.trim();

            if (!/^\d{8}$/.test(nocontrol)) {
                mostrarAlerta('alertaAsesorado', 'alertaAsesoradoMsg', 'El número de control debe tener exactamente 8 dígitos numéricos.');
                return;
            }

            setLoading('btnSubmitAsesorado', 'btnAsesoradoTexto', 'btnAsesoradoSpinner', true);

            try {
                // 1. Verificar que el nocontrol existe en la BD
                const verificacion = await verificarNocontrol(nocontrol);
                if (!verificacion.success) {
                    mostrarAlerta('alertaAsesorado', 'alertaAsesoradoMsg', 'El número de control no está registrado en el sistema. Verifica e intenta de nuevo.');
                    return;
                }

                // 2. Proceder con el registro de asesorado
                const response = await fetch('/api/register/asesorado', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nocontrol })
                });
                const result = await response.json();

                if (result.success) {
                    $('#modalAsesorado').modal('hide');
                    alert('¡Registro de asesorado exitoso! Puedes iniciar sesión.');
                    window.location.href = 'login.html';
                } else {
                    mostrarAlerta('alertaAsesorado', 'alertaAsesoradoMsg', result.message || 'Error al registrar. Intenta de nuevo.');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarAlerta('alertaAsesorado', 'alertaAsesoradoMsg', 'Error de conexión. Verifica tu red e intenta de nuevo.');
            } finally {
                setLoading('btnSubmitAsesorado', 'btnAsesoradoTexto', 'btnAsesoradoSpinner', false);
            }
        });

        // ── Formulario Tutor ──────────────────────────────────────────────────
        document.getElementById('formRegistroTutor').addEventListener('submit', async function (e) {
            e.preventDefault();
            const tipo = document.getElementById('tipoTutor').value;
            const nocontrol = document.getElementById('numeroControlTutor').value.trim();

            if (!tipo) {
                mostrarAlerta('alertaTutor', 'alertaTutorMsg', 'Por favor selecciona el tipo de tutor.');
                return;
            }
            if (!/^\d{8}$/.test(nocontrol)) {
                mostrarAlerta('alertaTutor', 'alertaTutorMsg', 'El número de control debe tener exactamente 8 dígitos numéricos.');
                return;
            }

            if (tipo === 'maestro') {
                mostrarAlerta('alertaTutor', 'alertaTutorMsg', 'El registro para maestros está en construcción.');
                return;
            }

            setLoading('btnSubmitTutor', 'btnTutorTexto', 'btnTutorSpinner', true);

            try {
                // Verificar que el nocontrol existe en la BD antes de redirigir
                const verificacion = await verificarNocontrol(nocontrol);
                if (!verificacion.success) {
                    mostrarAlerta('alertaTutor', 'alertaTutorMsg', 'El número de control no está registrado en el sistema. Verifica e intenta de nuevo.');
                    return;
                }

                // Redirigir al formulario completo con el nocontrol verificado
                window.location.href = 'registroAl_tutor.html?nocontrol=' + encodeURIComponent(nocontrol);
            } catch (error) {
                console.error('Error:', error);
                mostrarAlerta('alertaTutor', 'alertaTutorMsg', 'Error de conexión. Verifica tu red e intenta de nuevo.');
            } finally {
                setLoading('btnSubmitTutor', 'btnTutorTexto', 'btnTutorSpinner', false);
            }
        });
    </script>
</body>

</html>
