<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Platuto - Login</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

</head>

<body style="background-color: #008B8B;">

    <div class="container">

        <!-- Outer Row -->
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <div
                                class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-white p-4">
                                <img src="img/Logi.png" alt="Logo" style="max-width: 100%; height: auto;">
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4">INICIO DE SESION!</h1>
                                    </div>
                                    <form class="user" id="loginForm">
                                        <div class="form-group">
                                            <input type="text" class="form-control form-control-user" id="numeroControl"
                                                aria-describedby="numeroHelp" placeholder="Número de control"
                                                inputmode="numeric" pattern="[0-9]+"
                                                oninvalid="this.setCustomValidity('Solo se permiten números')"
                                                oninput="this.setCustomValidity('')" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user"
                                                id="exampleInputPassword" placeholder="Contraseña" required>
                                        </div>
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox small">
                                                <input type="checkbox" class="custom-control-input" id="customCheck">
                                                <label class="custom-control-label" for="customCheck">Recordarme</label>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-user btn-block mb-3"
                                            style="background-color: #008B8B; border-color: #008B8B; color: white;">
                                            Iniciar sesión
                                        </button>
                                    </form>
                                    <div class="text-center">
                                        <a class="small" href="register.html" style="color: #008B8B;">Crear una cuenta
                                            nueva!</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- Login Logic -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evitar la redirección directa por el formulario

            const nocontrol = document.getElementById('numeroControl').value;
            const password = document.getElementById('exampleInputPassword').value;

            // Validación en el frontend (solo números y máximo 8 dígitos)
            if (!/^\d{1,8}$/.test(password)) {
                alert('La contraseña debe contener solo números (máximo 8 dígitos).');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nocontrol, password })
                });

                const result = await response.json();

                if (result.success) {
                    // Si es exitoso, redirigimos al dashboard (index.html)
                    window.location.href = 'index.html';
                } else {
                    // Mostrar mensaje de error proveniente del backend
                    alert(result.message);
                }
            } catch (error) {
                console.error("Error en petición de login:", error);
                alert("Ocurrió un error al conectar con el servidor.");
            }
        });
    </script>
</body>

</html>
