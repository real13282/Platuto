<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Registro de Asesorado - Platuto">
    <meta name="author" content="">

    <title>Platuto - Registro de Asesorado</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <style>
        .bg-platuto {
            background-color: #008B8B;
        }

        .text-platuto {
            color: #008B8B;
        }

        .btn-platuto {
            background-color: #008B8B;
            border-color: #008B8B;
            color: white;
        }

        .btn-platuto:hover {
            background-color: #007373;
            border-color: #007373;
            color: white;
        }
    </style>
</head>

<body class="bg-platuto">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-4 font-weight-bold">Registro de Asesorado</h1>
                                        <p class="mb-4">Completa el siguiente formulario para darte de alta como asesorado en Platuto</p>
                                    </div>

                                    <form class="user" id="asesoradoForm">

                                        <h5 class="text-platuto font-weight-bold border-bottom pb-2 mb-4">Información Personal</h5>

                                        <div class="form-group row">
                                            <div class="col-sm-6 mb-3 mb-sm-0">
                                                <label for="nocontrol" class="ml-2 font-weight-bold">Número de Control</label>
                                                <input type="text" class="form-control form-control-user" id="nocontrol" placeholder="Número de Control" readonly>
                                            </div>
                                            <div class="col-sm-6">
                                                <label for="nombre" class="ml-2 font-weight-bold">Nombre Completo</label>
                                                <input type="text" class="form-control form-control-user" id="nombre" placeholder="Nombre completo" readonly>
                                            </div>
                                        </div>
                                        <div class="form-group row">
                                            <div class="col-sm-6">
                                                <label for="correo" class="ml-2 font-weight-bold">Correo Electrónico</label>
                                                <input type="text" class="form-control form-control-user" id="correo" placeholder="ejemplo@correo.com" readonly>
                                            </div>
                                            <div class="col-sm-6">
                                                <label for="telefono" class="ml-2 font-weight-bold">Número de Teléfono</label>
                                                <input type="tel" class="form-control form-control-user" id="telefono" placeholder="Ej. 1234567890" inputmode="numeric" pattern="[0-9]{10}" required maxlength="10" oninvalid="this.setCustomValidity('El teléfono debe tener exactamente 10 dígitos')" oninput="this.value = this.value.replace(/[^0-9]/g, ''); this.setCustomValidity('');">
                                            </div>
                                        </div>

                                        <div class="form-group row">
                                            <div class="col-sm-12 mb-3 mb-sm-0">
                                                <label for="foto" class="ml-2 font-weight-bold">Foto de Perfil</label>
                                                <input type="file" class="form-control-file ml-2 mt-2" id="foto" accept="image/*" required>
                                            </div>
                                        </div>

                                        <h5 class="text-platuto font-weight-bold border-bottom pb-2 mt-5 mb-4">Información Académica</h5>

                                        <div class="form-group row">
                                            <div class="col-sm-6 mb-3 mb-sm-0">
                                                <label for="carrera" class="ml-2 font-weight-bold">Carrera</label>
                                                <select class="form-control" style="border-radius: 10rem; height: 50px; padding-left: 20px; pointer-events: none; background-color: #eaecf4;" id="carrera" required>
                                                    <option value="" disabled selected>Selecciona tu carrera...</option>
                                                </select>
                                            </div>
                                            <div class="col-sm-6">
                                                <label for="semestre" class="ml-2 font-weight-bold">Semestre Actual</label>
                                                <select class="form-control" style="border-radius: 10rem; height: 50px; padding-left: 20px; pointer-events: none; background-color: #eaecf4;" id="semestre" required>
                                                    <option value="" disabled selected>Selecciona tu semestre...</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div class="form-group mt-4">
                                            <label for="materia_interes" class="ml-2 font-weight-bold">Materia de interés para tutoría</label>
                                            <select class="form-control" style="border-radius: 10rem; height: 50px; padding-left: 20px;" id="materia_interes" required>
                                                <option value="" disabled selected>Cargando materias...</option>
                                            </select>
                                        </div>

                                        <button type="submit" class="btn btn-platuto btn-user btn-block mt-5 font-weight-bold" style="font-size: 1.2rem;">
                                            Registrarme como Asesorado
                                        </button>

                                        <hr>
                                        <div class="text-center">
                                            <a class="small text-platuto" href="index.html">Cancelar y volver al inicio</a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- Asesorado Registration Logic -->
    <script src="js/registro_asesorado.js"></script>

</body>

</html>
