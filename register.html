<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Platuto - Register</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <style>
        .hover-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            transition: transform 0.2s ease-in-out;
        }

        .hover-card:hover {
            transform: scale(1.02);
        }

        .hover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(24, 106, 122, 0.85);
            /* #186a7a matching the primary theme */
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            border-radius: 15px;
            z-index: 10;
        }

        .hover-card:hover .hover-overlay {
            opacity: 1;
        }

        .hover-overlay i {
            color: white;
            font-size: 5rem;
        }

        /* Ensures the card body stays behind the overlay */
        .card-body {
            position: relative;
            z-index: 1;
        }
    </style>

</head>

<body style="background-color: #008B8B;">

    <div class="container">

        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

            <div class="col-12 text-center mb-5">
                <h1 class="text-white" style="font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.2);">¿Qué tipo de
                    cuenta deseas crear?</h1>
            </div>

            <!-- Asesorado Card -->
            <div class="col-md-6 col-lg-5 mb-4">
                <div class="card border-0 shadow-lg h-100 py-4 hover-card" data-toggle="modal"
                    data-target="#modalAsesorado">
                    <div class="hover-overlay">
                        <i class="fas fa-plus"></i>
                    </div>
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <div class="mb-4 mx-auto"
                            style="width: 200px; height: 200px; border: 2px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; background-color: #f8f9fc;">
                            <img src="img/asesorado.avif" alt="Logo" style="max-width: 100%; height: auto;">
                        </div>
                        <h2 class="h3 text-gray-800 font-weight-bold mb-0">Asesorado</h2>
                    </div>
                </div>
            </div>

            <!-- Tutor Card -->
            <div class="col-md-6 col-lg-5 mb-4">
                <div class="card border-0 shadow-lg h-100 py-4 hover-card" data-toggle="modal"
                    data-target="#modalTutor">
                    <div class="hover-overlay">
                        <i class="fas fa-plus"></i>
                    </div>
                    <div class="card-body text-center d-flex flex-column justify-content-center">
                        <div class="mb-4 mx-auto"
                            style="width: 200px; height: 200px; border: 2px dashed #ccc; border-radius: 15px; display: flex; align-items: center; justify-content: center; background-color: #f8f9fc;">
                            <img src="img/tutor.jpg" alt="Logo" style="max-width: 100%; height: auto;">
                        </div>
                        <h2 class="h3 text-gray-800 font-weight-bold mb-0">Tutor</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 text-center mt-4">
                <a class="text-white" href="login.html" style="font-size: 1.1rem; text-decoration: underline;">¿Ya
                    tienes una cuenta? Inicia sesión!</a>
            </div>

        </div>

    </div>

    <!-- Modal Asesorado -->
    <div class="modal fade" id="modalAsesorado" tabindex="-1" role="dialog" aria-labelledby="modalAsesoradoLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <form id="formRegistroAsesorado">
                    <div class="modal-header bg-primary text-white"
                        style="background-color: #008B8B !important; border-bottom: none;">
                        <h5 class="modal-title font-weight-bold" id="modalAsesoradoLabel">Registro de Asesorado</h5>
                        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body p-4">
                        <p class="mb-4 text-center">Por favor ingresa tu número de control para continuar:</p>
                        <div class="form-group">
                            <label for="numeroControlAsesorado" class="font-weight-bold text-gray-800">Número de
                                Control</label>
                            <input type="text" class="form-control form-control-user" id="numeroControlAsesorado"
                                placeholder="Ej. 12345678" inputmode="numeric" pattern="[0-9]{8}" minlength="8"
                                maxlength="8"
                                oninvalid="this.value === '' ? this.setCustomValidity('El número de control es requerido') : this.setCustomValidity('El número debe tener exactamente 8 dígitos (solo números)')"
                                oninput="this.setCustomValidity('')" required>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 justify-content-center">
                        <button type="button" class="btn btn-secondary px-4" data-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-primary px-4"
                            style="background-color: #008B8B; border-color: #008B8B;">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal Tutor -->
    <div class="modal fade" id="modalTutor" tabindex="-1" role="dialog" aria-labelledby="modalTutorLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <form id="formRegistroTutor">
                    <div class="modal-header bg-primary text-white"
                        style="background-color: #008B8B !important; border-bottom: none;">
                        <h5 class="modal-title font-weight-bold" id="modalTutorLabel">Registro de Tutor</h5>
                        <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body p-4">
                        <p class="mb-4 text-center">Selecciona tu rol e ingresa tu número de control:</p>
                        <div class="form-group">
                            <label for="tipoTutor" class="font-weight-bold text-gray-800">Tipo de Tutor</label>
                            <select class="form-control" id="tipoTutor" required
                                oninvalid="this.setCustomValidity('Por favor selecciona una opción')"
                                oninput="this.setCustomValidity('')">
                                <option value="" disabled selected>Selecciona una opción...</option>
                                <option value="alumno">Alumno</option>
                                <option value="maestro">Maestro</option>
                            </select>
                        </div>
                        <div class="form-group mt-3">
                            <label for="numeroControlTutor" class="font-weight-bold text-gray-800">Número de
                                Control</label>
                            <input type="text" class="form-control form-control-user" id="numeroControlTutor"
                                placeholder="Ej. 12345678" inputmode="numeric" pattern="[0-9]{8}" minlength="8"
                                maxlength="8"
                                oninvalid="this.value === '' ? this.setCustomValidity('El número de control es requerido') : this.setCustomValidity('El número debe tener exactamente 8 dígitos (solo números)')"
                                oninput="this.setCustomValidity('')" required>
                        </div>
                    </div>
                    <div class="modal-footer border-top-0 justify-content-center">
                        <button type="button" class="btn btn-secondary px-4" data-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-primary px-4"
                            style="background-color: #008B8B; border-color: #008B8B;">Enviar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <script>
        document.getElementById('formRegistroAsesorado').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nocontrol = document.getElementById('numeroControlAsesorado').value;
            
            try {
                const response = await fetch('/api/register/asesorado', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nocontrol })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('Registro de asesorado exitoso. Puedes iniciar sesión.');
                    window.location.href = 'login.html';
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ocurrió un error al registrar el asesorado.');
            }
        });

        document.getElementById('formRegistroTutor').addEventListener('submit', function(e) {
            e.preventDefault();
            const tipo = document.getElementById('tipoTutor').value;
            const nocontrol = document.getElementById('numeroControlTutor').value;
            
            if (tipo === 'alumno') {
                window.location.href = 'registroAl_tutor.html?nocontrol=' + encodeURIComponent(nocontrol);
            } else {
                window.location.href = 'registro_tutor.html?nocontrol=' + encodeURIComponent(nocontrol);
            }
        });
    </script>
</body>

</html>
