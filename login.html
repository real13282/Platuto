<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Platuto - Login</title>

    <!-- Custom fonts for this template-->
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

</head>

<body style="background-color: #008B8B;">

    <div class="container">

        <!-- Outer Row -->
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg">
                    <div class="card-body p-0">
                        <!-- Nested Row within Card Body -->
                        <div class="row">
                            <div
                                class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-white p-5">
                                <img src="img/Loge.png" alt="Logo"
                                    style="width: 85%; height: auto; object-fit: contain;">
                            </div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h2 mb-1 font-weight-bold" style="color: #008B8B;">Platuto</h1>
                                        <h2 class="h5 text-gray-700 mb-4">INICIO DE SESIÓN!</h2>
                                    </div>
                                    <form class="user" id="loginForm">
                                        <div class="form-group d-flex justify-content-center align-items-center mb-4">
                                            <div class="custom-control custom-radio mx-3" style="transform: scale(1.2);">
                                                <input type="radio" id="roleAsesorado" name="userRole" class="custom-control-input" value="asesorado" required oninvalid="this.setCustomValidity('Por favor selecciona un rol (Asesorado o Tutor)')" oninput="this.setCustomValidity('')">
                                                <label class="custom-control-label text-dark" for="roleAsesorado" style="font-size: 1.1rem;">Asesorado</label>
                                            </div>
                                            <div class="custom-control custom-radio mx-3" style="transform: scale(1.2);">
                                                <input type="radio" id="roleTutor" name="userRole" class="custom-control-input" value="tutor" required oninvalid="this.setCustomValidity('Por favor selecciona un rol (Asesorado o Tutor)')" oninput="this.setCustomValidity('')">
                                                <label class="custom-control-label text-dark" for="roleTutor" style="font-size: 1.1rem;">Tutor</label>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <input type="text" class="form-control form-control-user" id="numeroControl"
                                                aria-describedby="numeroHelp" placeholder="Número de control"
                                                inputmode="numeric" pattern="[0-9]{8}" minlength="8" maxlength="8"
                                                oninvalid="this.setCustomValidity('El número debe tener exactamente 8 dígitos')"
                                                oninput="this.setCustomValidity('')" required>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user"
                                                id="exampleInputPassword" placeholder="Contraseña" inputmode="numeric"
                                                pattern="[0-9]{6}" minlength="6" maxlength="6"
                                                oninvalid="this.setCustomValidity('Solo se permiten números (exactamente 6 dígitos)')"
                                                oninput="this.setCustomValidity('')" required>
                                        </div>
                                        <button type="submit" class="btn btn-user btn-block mb-3"
                                            style="background-color: #008B8B; border-color: #008B8B; color: white;">
                                            Iniciar sesión
                                        </button>
                                    </form>
                                    <div class="text-center">
                                        <a href="register.html"
                                            style="color: #008B8B; font-size: 1.1rem; font-weight: 600;">Crear una
                                            cuenta
                                            nueva!</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap core JavaScript-->
    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <!-- Login Logic -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evitar la redirección directa por el formulario

            const nocontrol = document.getElementById('numeroControl').value;
            const password = document.getElementById('exampleInputPassword').value;
            const role = document.querySelector('input[name="userRole"]:checked').value;

            // Validación en el frontend (solo números y exactamente 6 dígitos)
            if (!/^\d{6}$/.test(password)) {
                alert('La contraseña debe contener solo números (exactamente 6 dígitos).');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nocontrol, password, role })
                });

                const result = await response.json();

                if (result.success) {
                    // Si es exitoso, redirigimos al dashboard (index.html)
                    window.location.href = 'index.html';
                } else {
                    // Mostrar mensaje de error proveniente del backend
                    alert(result.message);
                }
            } catch (error) {
                console.error("Error en petición de login:", error);
                alert("Ocurrió un error al conectar con el servidor.");
            }
        });
    </script>
</body>

</html>
